<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *,

        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ui-bg: rgba(8, 10, 20, 0.82);
            --ui-border: rgba(100, 200, 255, 0.18);
            --accent: #4af0ff;
            --accent2: #ff6b6b;
            --text: #e8f4ff;
            --muted: #ebf2de;
            --panel-radius: 14px;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #060810;
            color: var(--text);
            cursor: default;
            user-select: none;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* ── Left Panel ── */
        #stats-panel {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 20;
            background: var(--ui-bg);
            border: 1px solid var(--ui-border);
            border-radius: var(--panel-radius);
            padding: 18px 20px;
            width: 230px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;

            color: var(--accent);
            margin-bottom: 14px;

            border-bottom: 1px solid var(--ui-border);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--muted);
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-val {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            background: rgba(74, 240, 255, 0.07);
            padding: 3px 8px;
            border-radius: 5px;
            min-width: 70px;
            text-align: right;
        }

        .energy-bar-wrap {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--ui-border);
        }


        .energy-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .energy-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.08s linear;
        }

        .ke-fill {
            background: var(--accent);
        }

        .pe-fill {
            background: var(--accent2);
        }

        /* ── Right Controls Panel ── */
        #controls-panel {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 20;
            background: var(--ui-bg);
            border: 1px solid var(--ui-border);
            border-radius: var(--panel-radius);
            padding: 18px 20px;
            width: 230px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .ctrl-row {
            margin-bottom: 14px;
        }

        .ctrl-row:last-child {
            margin-bottom: 0;
        }

        .ctrl-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ctrl-label span {
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
        }

        input[type=range] {
            appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid #060810;
            cursor: pointer;
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .reset-btn {
            width: 100%;
            margin-top: 14px;
            padding: 9px;
            background: rgba(74, 240, 255, 0.1);
            border: 1px solid rgba(74, 240, 255, 0.3);
            border-radius: 8px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .reset-btn:hover {
            background: rgba(74, 240, 255, 0.18);
            border-color: rgba(74, 240, 255, 0.5);
        }
    </style>

  <script type="module" crossorigin src="/assets/index-c-YSfwO5.js"></script>
</head>

<body>

    <!-- Stats -->
    <div id="stats-panel">
        <div class="panel-title">معلومات عن الحالة </div>
        <div class="stat-row">KE (الطاقة حركية) <span class="stat-val" id="ke-val">0.000 J</span></div>
        <div class="stat-row">PE (الطاقة الوضعية) <span class="stat-val" id="pe-val">0.000 J</span></div>
        <div class="stat-row">TE (الطاقة الكلية) <span class="stat-val" id="te-val">0.000 J</span></div>
        <div class="stat-row">الزخم (kg·m/s) <span class="stat-val" id="mom-val">0.000</span></div>
        <div class="energy-bar-wrap">
            <div class="energy-bar-label">KE</div>
            <div class="energy-bar">
                <div class="energy-bar-fill ke-fill" id="ke-bar" style="width:0%"></div>
            </div>
            <div class="energy-bar-label">PE</div>
            <div class="energy-bar">
                <div class="energy-bar-fill pe-fill" id="pe-bar" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div id="controls-panel">
        <div class="panel-title">تخصيص التجربة</div>
        <div class="ctrl-row">
            <div class="ctrl-label">عدد الكرات <span id="nball-val">5</span></div>
            <input type="range" id="nball-slider" min="2" max="10" step="1" value="5">
        </div>
        <div class="ctrl-row">
            <div class="ctrl-label">كتلة الكرة (kg) <span id="mass-val">1.00</span></div>
            <input type="range" id="mass-slider" min="0.1" max="5" step="0.1" value="1.0">
        </div>
        <div class="ctrl-row">
            <div class="ctrl-label">معامل الارتداد <span id="rest-val">1.00</span></div>
            <input type="range" id="rest-slider" min="0" max="1" step="0.01" value="1.0">
        </div>
        <div class="ctrl-row">
            <div class="ctrl-label">تخميد الهواء <span id="damp-val">0.05</span></div>
            <input type="range" id="damp-slider" min="0" max="0.8" step="0.01" value="0.05">
        </div>
        <div class="ctrl-row">
            <div class="ctrl-label">سرعة المحاكاة <span id="speed-val">1.00</span></div>
            <input type="range" id="speed-slider" min="0.1" max="3" step="0.05" value="1.0">
        </div>
        <button class="reset-btn" id="reset-btn"> إعادة ضبط</button>
    </div>

    <div id="canvas-container"></div>

</body>

</html>
